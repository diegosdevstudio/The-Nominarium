<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nominarium — AI Brand Identity Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0B0F19;
            --bg2: #0f1520;
            --cyan: #22D3EE;
            --blue: #2563EB;
            --text: #F8FAFC;
            --text-muted: #94A3B8;
            --glass: rgba(255,255,255,0.04);
            --glass-border: rgba(255,255,255,0.08);
            --glow-cyan: rgba(34,211,238,0.15);
            --glow-blue: rgba(37,99,235,0.2);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Fixed Background Effects */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(34,211,238,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(34,211,238,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* Top Nav */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            height: 64px;
            background: rgba(11,15,25,0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }

        .nav-brand {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--cyan), var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-settings {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-settings:hover {
            border-color: var(--cyan);
            color: var(--cyan);
        }

        /* Content Layout */
        main { position: relative; z-index: 1; padding-top: 100px; padding-bottom: 100px; }

        .hero { text-align: center; margin-bottom: 60px; padding: 0 2rem; }
        .hero-title { 
            font-size: clamp(2.5rem, 8vw, 5rem); 
            font-weight: 900; 
            line-height: 1; 
            margin-bottom: 1rem;
        }
        .hero-title span {
            background: linear-gradient(135deg, var(--cyan), var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .command-panel { max-width: 800px; margin: 0 auto; padding: 0 2rem; display: flex; flex-direction: column; gap: 20px; }
        
        .panel-section {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
        }

        .section-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: var(--cyan);
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        textarea#vision {
            width: 100%;
            min-height: 120px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            padding: 15px;
            font-family: inherit;
            outline: none;
            resize: vertical;
        }

        .chips-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .chip {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.03);
            color: var(--text-muted);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .chip.active {
            border-color: var(--cyan);
            background: rgba(34,211,238,0.1);
            color: var(--cyan);
        }

        .btn-generate {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--cyan), var(--blue));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            margin-top: 10px;
        }

        .identity-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            margin-top: 20px;
            backdrop-filter: blur(20px);
        }

        .card-name { font-size: 2.5rem; font-weight: 800; margin-bottom: 10px; color: var(--cyan); }
        .card-soul { color: var(--text-muted); line-height: 1.6; margin-bottom: 20px; }
        
        .swatch-color { width: 40px; height: 40px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); }

        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-overlay.visible { display: flex; }
        .modal { background: #0F172A; padding: 30px; border-radius: 16px; width: 100%; max-width: 400px; border: 1px solid var(--glass-border); }
        
        #results-area { max-width: 800px; margin: 40px auto; padding: 0 2rem; }
    </style>
</head>
<body>

<nav>
    <div class="nav-brand">DIEGOSDEV STUDIO</div>
    <button class="btn-settings" onclick="openSettings()">API Key</button>
</nav>

<main>
    <section class="hero">
        <h1 class="hero-title">The<br><span>Nominarium</span></h1>
        <p style="color: var(--text-muted)">High-End AI Brand Identity Engine</p>
    </section>

    <div class="command-panel">
        <div class="panel-section">
            <div class="section-label">01 — Brand Vision</div>
            <textarea id="vision" placeholder="Describe the soul of your brand..."></textarea>
        </div>

        <div class="panel-section">
            <div class="section-label">02 — Essence Tags</div>
            <div class="chips-grid" id="chips-container">
                <div class="chip" onclick="toggleChip(this)">Heritage</div>
                <div class="chip" onclick="toggleChip(this)">Avant-Garde</div>
                <div class="chip" onclick="toggleChip(this)">Minimalist</div>
                <div class="chip" onclick="toggleChip(this)">Sustainable</div>
                <div class="chip" onclick="toggleChip(this)">Disruptive</div>
                <div class="chip" onclick="toggleChip(this)">Kinetic</div>
                <div class="chip" onclick="toggleChip(this)">Ethereal</div>
                <div class="chip" onclick="toggleChip(this)">Brutalist</div>
                <div class="chip" onclick="toggleChip(this)">Neo-Classic</div>
                <div class="chip" onclick="toggleChip(this)">Bespoke</div>
            </div>
        </div>

        <button class="btn-generate" id="gen-btn" onclick="generate()">Forge Identity</button>
        <div id="status" style="text-align: center; font-size: 0.8rem; color: var(--cyan); margin-top: 10px; display: none;">Processing...</div>
    </div>

    <div id="results-area"></div>
</main>

<div class="modal-overlay" id="modal">
    <div class="modal">
        <h2 style="margin-bottom: 10px;">Settings</h2>
        <input type="password" id="api-key-input" placeholder="Gemini API Key" style="width: 100%; padding: 10px; margin-bottom: 20px; background: #000; color: white; border: 1px solid var(--glass-border);">
        <button class="btn-generate" onclick="saveSettings()">Save & Close</button>
    </div>
</div>

<script>
    const selectedEssences = new Set();
    
    function toggleChip(el) {
        const val = el.innerText;
        if (selectedEssences.has(val)) {
            selectedEssences.delete(val);
            el.classList.remove('active');
        } else {
            selectedEssences.add(val);
            el.classList.add('active');
        }
    }

    function openSettings() { document.getElementById('modal').classList.add('visible'); }
    function saveSettings() {
        localStorage.setItem('nominarium_key', document.getElementById('api-key-input').value);
        document.getElementById('modal').classList.remove('visible');
    }

    async function generate() {
        const vision = document.getElementById('vision').value;
        const key = localStorage.getItem('nominarium_key');
        if (!key) return alert("Please set your API key first!");

        const btn = document.getElementById('gen-btn');
        const status = document.getElementById('status');
        btn.disabled = true;
        status.style.display = 'block';

        const prompt = `Generate 5 brand names for: ${vision}. Tags: ${[...selectedEssences].join(', ')}. Respond only in JSON array format: [{"name": "", "soul": "", "palette": "#hex, #hex"}]`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            const text = data.candidates[0].content.parts[0].text;
            const json = JSON.parse(text.replace(/```json|```/g, ''));
            
            render(json);
        } catch (e) {
            alert("Error generating. Check your key or vision description.");
            console.error(e);
        } finally {
            btn.disabled = false;
            status.style.display = 'none';
        }
    }

    function render(data) {
        const area = document.getElementById('results-area');
        area.innerHTML = '';
        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'identity-card';
            card.innerHTML = `
                <div class="card-name">${item.name}</div>
                <div class="card-soul">${item.soul}</div>
                <div style="display: flex; gap: 10px;">
                    ${item.palette.split(',').map(c => `<div class="swatch-color" style="background: ${c.trim()}"></div>`).join('')}
                </div>
            `;
            area.appendChild(card);
        });
    }
</script>
</body>
</html>
